name: Update AI Rankings

on:
  # 每天3次自动刷新：UTC 0:00/6:00/12:00 = 北京时间 8:00/14:00/20:00
  schedule:
    - cron: '0 0 * * *'    # 北京时间 08:00
    - cron: '0 6 * * *'    # 北京时间 14:00
    - cron: '0 12 * * *'   # 北京时间 20:00
  # 支持手动触发
  workflow_dispatch:
  # 推送到 main 时也部署
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'data/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔄 Fetch latest data
        run: node fetch-data.js
        env:
          NODE_ENV: production

      - name: 🏗️ Build page with fresh data
        run: node build-page.js

      - name: 📊 Check for data changes
        id: check_changes
        run: |
          if git diff --quiet index.html data/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "📋 No data changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📋 Data changes detected!"
            git diff --stat index.html data/
          fi

      - name: 📤 Commit data changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          TIMESTAMP=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')
          git commit -m "🔄 自动更新排行榜数据 - ${TIMESTAMP}" || true
          git push

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 📋 Summary
        if: always()
        run: |
          echo "## 🏆 AI Rankings Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/meta.json ]; then
            echo "### Data Sources" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/meta.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Data Changes:** ${{ steps.check_changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "**Site URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
